<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lights of Imaan 🌙</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      transition: 0.5s;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      max-width: 500px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="overlay">

    <h1>🌙 Lights of Imaan</h1>

    <div class="card">
      <h3>📿 Daily Dua</h3>
      <p id="dua">Loading...</p>
    </div>

    <div class="card">
      <h3>📖 Ayah</h3>
      <p id="ayah">Loading...</p>
    </div>

    <div class="card">
      <h3>🤲 Quote</h3>
      <p id="quote">Loading...</p>
    </div>

    <button onclick="loadData()">Refresh</button>

  </div>

<script>
async function loadData() {
  try {
    const res = await fetch("/content");
    const data = await res.json();

    document.getElementById("dua").innerText = data.dua;
    document.getElementById("ayah").innerText = data.ayah;
    document.getElementById("quote").innerText = data.quote;

    document.body.style.backgroundImage = `url('${data.wallpaper}')`;

  } catch (err) {
    alert("Error loading content");
  }
}

// auto load on start
loadData();
</script>

</body>
</html>
